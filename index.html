<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>urlargs test</title>
</head>
<body>

	<!-- None -->
	<p>
		None: <a href="?">
			/?
		</a>
	</p>

	<!-- Short -->
	<p>
		Short: <a href="?count=20&enabled=false">
			/?count=20&enabled=false
		</a>
	</p>

	<!-- Long -->
	<p>
		Long: <a href="?count=20&enabled=false&name=urlargs&tags=b,c">
			/?count=20&enabled=false&name=urlargs&tags=b,c
		</a>
	</p>

	<!-- Allowed -->
	<p>
		Allowed: <a href="?theme=dark&size=medium&priority=3">
			/?theme=dark&size=medium&priority=3
		</a>
	</p>

	<!-- Overriding Nullish -->
	<p>
		Overriding Nullish: <a href="?optionalNum=undefined">
			/?optionalNum=undefined
		</a>
	</p>

	<hr>

	<p>Click the links to change the URL arguments. Open your console to see argument descriptions.</p>

	<script type="module">
			import { UrlArgs, u } from './src/index.ts';

			const defaults = {
				count:         10,
				enabled:       true,
				name:          'test',

				tagsWithDefault:    u.array( [ 'a', 'b' ] ),
				numbersWithDefault: u.array( [ 1, 2, 3 ] ),
				flagsWithDefault:   u.array( [ true, false ] ),

				emptyStringArray:   u.array( u.string() ),
				emptyNumberArray:   u.array( u.number() ),
				emptyBooleanArray:  u.array( u.boolean() ),

				optionalNum:   u.optional( u.number(), 100 ),
				nullableStr:   u.nullable( u.string() ),

				theme:         u.oneof( [ 'light', 'dark', 'auto' ] ),
				size:          u.oneof( [ 'small', 'medium', 'large' ] ),
				priority:      u.oneof( [ 1, 2, 3, 4, 5 ] ),
			};

			const args = new UrlArgs( defaults );

			args.describeAll( {
				count:              'A plain number with a default',
				enabled:            'A plain boolean with a default',
				name:               'A plain string with a default',
				tagsWithDefault:    'String array, type inferred from default',
				numbersWithDefault: 'Number array, type inferred from default',
				flagsWithDefault:   'Boolean array, type inferred from default',
				emptyStringArray:   'Empty string array, explicit element type',
				emptyNumberArray:   'Empty number array, explicit element type',
				emptyBooleanArray:  'Empty boolean array, explicit element type',
				optionalNum:        'Number that can be undefined',
				nullableStr:        'String that can be null',
				theme:              'One of these specific strings',
				size:               'One of these specific strings',
				priority:           'One of these specific numbers',
			} );

			window.args = args;
		</script>
</body>
</html>
