<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>urlargs test</title>
</head>
<body>

	<!-- None -->
	<p>
		None: <a href="?">
			/?
		</a>
	</p>

	<!-- Short -->
	<p>
		Short: <a href="?count=20&enabled=false">
			/?count=20&enabled=false
		</a>
	</p>

	<!-- Long -->
	<p>
		Long: <a href="?count=20&enabled=false&name=urlargs&tags=b&tags=c">
			/?count=20&enabled=false&name=urlargs&tags=b&tags=c
		</a>
	</p>

	<!-- Allowed -->
	<p>
		Allowed: <a href="?theme=dark&size=medium&count=50">
			/?theme=dark&size=medium&count=50
		</a>
	</p>

	<hr>

	<p>Click the links to change the URL arguments. Open your console to see argument descriptions.</p>

	<script type="module">
			import { UrlArgs, $undefined, $null, $array, $allowed } from './src/index.ts';

			const defaults = {
				count: 10,
				enabled: true,
				name: 'test',
				tags: [ 'a', 'b' ],
				undefinedNumber: $undefined.number,
				nullString: $null.string,
				arrayNumber: $array.number,
				arrayBoolean: $array.boolean,
				arrayString: $array.string,
				theme: $allowed.string( 'light', 'dark', 'auto' ),
				size: $allowed.string( 'small', 'medium', 'large' ),
				priority: $allowed.number( 1, 2, 3, 4, 5 ),
			};

			const args = new UrlArgs( defaults );

			args.describe( {
				count: 'The number of items to display',
				enabled: 'Whether the items are enabled',
				name: 'The name of the items',
				undefinedNumber: 'Use $undefined.number to allow undefined values',
				nullString: 'Use $null.string to allow null values',
				arrayNumber: 'Use $array.number to allow array of numbers',
				arrayBoolean: 'Use $array.boolean to allow array of booleans',
				arrayString: '$array.string is included for consistency, but not necessary',
				theme: 'Use $allowed.string to restrict values to a specific set',
				size: 'Size of the component',
				priority: 'Use $allowed.number to restrict numbers to specific values',
			} );

			window.args = args;
		</script>
</body>
</html>
